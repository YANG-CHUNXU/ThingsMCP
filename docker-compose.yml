services:
  things-mcp:
    build: .
    env_file:
      - .env
    environment:
      THINGS_MCP_DB_PATH: /data/entities.sqlite
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - things-mcp-data:/data
    command: ["things-mcp", "serve", "--host", "0.0.0.0", "--port", "8765"]
    restart: unless-stopped

volumes:
  things-mcp-data:
